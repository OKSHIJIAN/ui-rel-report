<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>UI-REL 在线报告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;overflow:hidden;}
        body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;line-height:1.6;display:flex;flex-direction:column;transition:background .25s,color .25s;}
        body.dark{background:#16162a;color:#d0d0dc;}
        body.dark .nav-sidebar{background:#1e1e32;border-color:#2a2a44;}
        body.dark .nav-header{background:#1e1e32;border-color:#2a2a44;}
        body.dark .nav-summary-val{color:#d0d0dc;}
        body.dark .nav-summary-lbl{color:#888;}
        body.dark .nav-item{background:#252540;border-color:#333355;}
        body.dark .nav-item:hover{background:#2e2e50;border-color:#444;}
        body.dark .nav-item.active{background:#4a3db8;}
        body.dark .nav-title{color:#d0d0dc;}
        body.dark .nav-meta{color:#888;}
        body.dark .nav-thumb-wrap{background:#2a2a44;}
        body.dark .task-section{background:#1e1e32;border-color:#333355;}
        body.dark .task-title{color:#d0d0dc;}
        body.dark .stat-card{background:#22223a;border-color:#333355;}
        body.dark .stat-lbl{color:#888;}
        body.dark .main-img-wrap img{border-color:#333355;}
        body.dark .img-controls{background:rgba(30,30,55,.7);}
        body.dark .img-controls label{color:#999;}
        body.dark .bug-table{background:#22223a;border-color:#333355;}
        body.dark .bug-table th{background:#1a1a30;color:#999;border-color:#333355;}
        body.dark .bug-table td{border-color:#2a2a48;color:#ccc;}
        body.dark .bug-table tr:hover td{background:#2a2a40;}
        body.dark .toolbar{background:#1e1e32;border-color:#333355;}
        body.dark .toolbar-title{color:#d0d0dc;}
        body.dark .toolbar-date{color:#999;}
        body.dark .toolbar-user{color:#777;}
        body.dark .tool-btn{background:#252540;border-color:#444;color:#ccc;}
        body.dark .tool-btn:hover{background:#2e2e50;border-color:#6c5ce7;color:#6c5ce7;}
        body.dark .status-bar{background:#1e1e32;border-color:#333355;color:#999;}
        body.dark .content-area{background:#16162a;}
        body.dark .resize-handle{background:#2a2a44;}
        body.dark .section-title{color:#d0d0dc;}
        body.dark .loading-overlay{background:rgba(22,22,42,.95);}
        .report-wrap{display:flex;flex:1;overflow:hidden;}
        .nav-sidebar{width:240px;flex-shrink:0;height:100%;background:#fff;border-right:1px solid #e4e6eb;display:flex;flex-direction:column;overflow:hidden;transition:background .25s,border-color .25s;}
        .nav-header{flex-shrink:0;padding:16px;border-bottom:1px solid #eee;background:#fff;}
        .nav-summary{display:flex;gap:12px;}
        .nav-summary-item{text-align:center;}
        .nav-summary-val{font-size:36px;font-weight:400;font-family:'Bebas Neue',sans-serif;color:#6c5ce7;letter-spacing:1px;}
        .nav-summary-lbl{font-size:10px;color:#999;text-transform:uppercase;}
        .nav-list{flex:1;overflow-y:auto;padding:8px;}
        .nav-footer{flex-shrink:0;padding:10px 14px;border-top:1px solid #eee;font-size:10px;color:#999;line-height:1.6;}
        .nav-footer a{color:#6c5ce7;text-decoration:none;font-weight:600;}
        .nav-footer a:hover{text-decoration:underline;}
        body.dark .nav-footer{border-color:#2a2a44;color:#777;}
        body.dark .nav-footer a{color:#8b7cf7;}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s;background:#f8f9fc;border-color:#eee;margin-bottom:4px;}
        .nav-item:hover{background:#f0f1f8;border-color:#d0d0e8;}
        .nav-item.active{background:#6c5ce7;border-color:#6c5ce7;}
        .nav-item.active .nav-title,.nav-item.active .nav-meta{color:#fff;}
        .nav-item.is-child{padding-left:28px;font-size:11px;}
        .nav-thumb-wrap{width:40px;height:40px;flex-shrink:0;border-radius:6px;overflow:hidden;background:#eee;}
        .nav-thumb{width:100%;height:100%;object-fit:cover;}
        .nav-info{flex:1;min-width:0;}
        .nav-title{font-size:12px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .nav-meta{font-size:10px;color:#888;}
        /* ===== 文件夹样式 ===== */
        .nav-folder{margin-bottom:2px;}
        .nav-folder-header{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:12px;font-weight:600;color:#555;user-select:none;border:1px solid transparent;}
        .nav-folder-header:hover{background:#f0f1f8;border-color:#d0d0e8;color:#333;}
        .nav-folder-arrow{display:inline-block;transition:transform .25s cubic-bezier(.4,0,.2,1);font-size:10px;width:16px;text-align:center;flex-shrink:0;color:#aaa;}
        .nav-folder.open .nav-folder-arrow{transform:rotate(90deg);color:#6c5ce7;}
        .nav-folder-icon{font-size:14px;flex-shrink:0;}
        .nav-folder-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .nav-folder-count{font-size:10px;color:#aaa;flex-shrink:0;}
        .nav-folder-body{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
        .nav-folder.open .nav-folder-body{max-height:2000px;}
        .nav-folder-body .nav-item{margin-left:8px;margin-bottom:2px;padding:8px 10px;border-radius:6px;font-size:11px;}
        .nav-folder-body .nav-item .nav-title{font-size:11px;}
        /* dark */
        body.dark .nav-folder-header{color:#aaa;}
        body.dark .nav-folder-header:hover{background:#2a2a44;border-color:#444;color:#d0d0dc;}
        body.dark .nav-folder-arrow{color:#666;}
        body.dark .nav-folder.open .nav-folder-arrow{color:#8b7cf7;}
        body.dark .nav-folder-count{color:#666;}
        /* ===== 彩带动效 ===== */
        .confetti-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9997;}
        .resize-handle{width:8px;cursor:col-resize;flex-shrink:0;background:#e4e6eb;transition:background .2s;position:relative;z-index:10;}
        .resize-handle:hover,.resize-handle:active{background:#6c5ce7;}
        .content-area{flex:1;overflow-y:auto;padding:20px;}
        .task-section{margin:0 auto 30px;padding:20px;max-width:1000px;background:#fff;border-radius:12px;border:1px solid #e4e6eb;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .25s;position:relative;overflow:visible;}
        .no-bug-badge{position:absolute;top:-24px;right:-16px;z-index:10;}
        .no-bug-badge img{width:140px;height:auto;opacity:0.92;}
        .task-header{margin-bottom:16px;}
        .task-title-row{display:flex;align-items:center;gap:10px;}
        .task-title{font-size:18px;font-weight:700;color:#222;}
        .task-stats{display:flex;gap:16px;margin-top:12px;}
        .stat-card{flex:1;padding:12px;background:#f8f9fc;border-radius:8px;border:1px solid #eee;text-align:center;transition:all .25s;}
        .stat-val{font-size:20px;font-weight:700;color:#6c5ce7;}
        .stat-val.danger{color:#ff5c5c;}
        .stat-val.success{color:#00d68f;}
        .stat-lbl{font-size:10px;color:#888;text-transform:uppercase;margin-top:4px;}
        .main-img-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
        .img-pair{position:relative;width:100%;max-width:800px;border-radius:8px;overflow:hidden;border:2px solid #e4e6eb;transition:border-color .25s;}
        .img-pair img{width:100%;height:auto;display:block;}
        .overlay-img{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.5;pointer-events:none;}
        .r-bug-marker{position:absolute;transform:translate(-50%,-50%);z-index:10;cursor:pointer;transition:left .35s cubic-bezier(.34,1.56,.64,1),top .35s cubic-bezier(.34,1.56,.64,1);}
        .r-bug-marker.dimmed{opacity:.2;}
        .r-bug-dot{width:34px;height:34px;border-radius:50%;background:#ff5c5c;border:3px solid white;box-shadow:0 2px 10px rgba(255,92,92,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .25s ease;}
        .r-bug-dot.checked-green{background:#00d68f;box-shadow:0 2px 10px rgba(0,214,143,.4);}
        .r-bug-dot.unchecked-red{background:#ff5c5c;}
        .r-bug-num{font-size:14px;font-weight:800;color:white;}
        .r-bug-label{position:absolute;top:20px;left:18px;background:rgba(255,92,92,.95);color:white;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap;box-shadow:0 2px 8px rgba(255,92,92,.35);pointer-events:none;opacity:0;transform:translateY(-4px);transition:opacity .2s ease,transform .2s ease;}
        .r-bug-marker:hover .r-bug-dot{transform:scale(1.3);}
        .r-bug-marker:hover .r-bug-label{opacity:1;transform:none;}
        .img-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;padding:8px 16px;background:rgba(255,255,255,.65);border-radius:10px;backdrop-filter:blur(8px);}
        .img-controls label{font-size:12px;color:#666;font-weight:500;}
        .img-controls input[type=range]{width:120px;height:4px;-webkit-appearance:none;appearance:none;background:#ddd;border-radius:2px;outline:none;}
        .img-controls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#6c5ce7;cursor:pointer;}
        .section-title{font-size:13px;font-weight:700;margin:16px 0 10px;color:#222;display:flex;align-items:center;gap:6px;}
        .section-title::before{content:"";width:4px;height:14px;background:#6c5ce7;border-radius:2px;}
        .bug-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e4e6eb;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:all .25s;}
        .bug-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#888;background:#fafbfc;padding:8px 12px;border-bottom:2px solid #eee;}
        .bug-table td{padding:8px 12px;border-bottom:1px solid #f7f8fa;font-size:12px;vertical-align:top;}
        .bug-table tr:last-child td{border-bottom:none;}
        .bug-table tr:hover td{background:#fef5f5;}
        .r-bug-cb{width:16px;height:16px;accent-color:#00d68f;cursor:pointer;}
        .r-bug-id-td{color:#ff5c5c;font-weight:700;transition:color .25s;}
        .toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #eee;height:50px;flex-shrink:0;z-index:100;}
        .toolbar-left{display:flex;align-items:center;gap:12px;}
        .toolbar-title{font-size:14px;font-weight:600;color:#333;}
        .toolbar-date{font-size:11px;color:#888;}
        .tool-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ccc;background:#fff;transition:all .2s;color:#666;}
        .tool-btn:hover{border-color:#6c5ce7;color:#6c5ce7;background:#fafaff;}
        .status-bar{padding:8px 16px;background:#fff;border-bottom:1px solid #eee;font-size:11px;color:#888;display:flex;align-items:center;gap:6px;}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#00d68f;}
        .status-dot.offline{background:#ff5c5c;}
        .share-link{position:relative;}
        .share-link .tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;}
        .share-link:hover .tooltip{opacity:1;}
        .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:9999;}
        .loading-overlay.hidden{display:none;}
        .loading-spinner{width:40px;height:40px;border:3px solid #e4e6eb;border-top-color:#6c5ce7;border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        /* 协作功能样式 */
        .collab-users{display:flex;align-items:center;gap:6px;margin-right:8px;}
        .collab-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
        .remote-cursor{position:fixed;pointer-events:none;z-index:9998;transition:left .1s,top .1s;}
        .remote-cursor .cursor-pointer{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:12px solid currentColor;transform:rotate(-45deg);margin-left:-3px;}
        .remote-cursor .cursor-label{position:absolute;left:14px;top:12px;padding:2px 8px;background:currentColor;color:#fff;font-size:11px;font-weight:600;border-radius:10px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
        .collab-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;}
        .collab-toast.show{opacity:1;}
        .pri-badge.pri-p1{background:#ff3b3b;}
        .pri-badge.pri-p2{background:#ff8c00;}
        .pri-badge.pri-p3{background:#e6a800;}
        /* 登录/注册弹窗 */
        .auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
        .auth-overlay.show{opacity:1;pointer-events:auto;}
        .auth-panel{background:#fff;border-radius:16px;padding:32px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);position:relative;transform:translateY(10px);transition:transform .25s;}
        .auth-overlay.show .auth-panel{transform:translateY(0);}
        body.dark .auth-panel{background:#22223a;box-shadow:0 20px 60px rgba(0,0,0,.5);}
        .auth-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:#f0f2f5;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
        .auth-close:hover{background:#e4e6eb;}
        body.dark .auth-close{background:#333355;color:#ccc;}
        body.dark .auth-close:hover{background:#444466;}
        .auth-panel h2{font-size:22px;font-weight:700;margin-bottom:4px;color:#222;}
        body.dark .auth-panel h2{color:#d0d0dc;}
        .auth-subtitle{font-size:13px;color:#888;margin-bottom:24px;}
        .auth-field{margin-bottom:16px;}
        .auth-field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:#555;}
        body.dark .auth-field label{color:#999;}
        .auth-input{width:100%;padding:10px 14px;border:2px solid #e4e6eb;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:#333;}
        .auth-input:focus{border-color:#6c5ce7;}
        body.dark .auth-input{background:#1a1a30;border-color:#333355;color:#d0d0dc;}
        body.dark .auth-input:focus{border-color:#7c6df7;}
        .auth-btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#6c5ce7;color:#fff;}
        .auth-btn:hover{background:#5a4bd1;transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,92,231,.4);}
        .auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
        .auth-msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
        .auth-msg.show{display:block;}
        .auth-msg.error{background:#fff0f0;color:#d63031;border:1px solid #ffcccc;}
        .auth-msg.success{background:#f0fff4;color:#00a854;border:1px solid #b7ebcf;}
        body.dark .auth-msg.error{background:#2a1a1a;color:#ff6b6b;border-color:#4a2222;}
        body.dark .auth-msg.success{background:#1a2a1a;color:#00d68f;border-color:#224422;}
        .auth-link{font-size:13px;color:#6c5ce7;cursor:pointer;text-align:center;margin-top:12px;}
        .auth-link:hover{text-decoration:underline;color:#5a4bd1;}
        .auth-mode-switch{text-align:center;margin-top:16px;font-size:13px;color:#888;}
        .auth-mode-switch span{color:#6c5ce7;cursor:pointer;font-weight:600;}
        .auth-mode-switch span:hover{text-decoration:underline;}
        /* 工具栏用户按钮 */
        .user-btn{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;border:1px solid #e4e6eb;background:#f8f9fc;cursor:pointer;transition:all .2s;font-size:12px;color:#555;font-weight:500;}
        .user-btn:hover{border-color:#6c5ce7;background:#fafaff;}
        body.dark .user-btn{background:#252540;border-color:#333355;color:#ccc;}
        body.dark .user-btn:hover{border-color:#7c6df7;background:#2e2e50;}
        .user-avatar{width:28px;height:28px;border-radius:50%;background:#6c5ce7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
        .user-avatar.logged-in{background:#00d68f;}
        .user-dropdown{position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.12);border:1px solid #e4e6eb;min-width:160px;z-index:10001;display:none;overflow:hidden;}
        .user-dropdown.show{display:block;}
        body.dark .user-dropdown{background:#22223a;border-color:#333355;box-shadow:0 8px 30px rgba(0,0,0,.5);}
        .user-dropdown-item{padding:10px 16px;font-size:13px;cursor:pointer;color:#333;transition:background .15s;display:flex;align-items:center;gap:8px;}
        .user-dropdown-item:hover{background:#f5f5ff;}
        .user-dropdown-item.danger{color:#d63031;border-top:1px solid #eee;}
        body.dark .user-dropdown-item{color:#ccc;}
        body.dark .user-dropdown-item:hover{background:#2a2a44;}
        body.dark .user-dropdown-item.danger{color:#ff6b6b;border-top-color:#333355;}
        .user-dropdown-email{font-size:11px;color:#888;padding:6px 16px 8px;border-bottom:1px solid #eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        body.dark .user-dropdown-email{border-bottom-color:#333355;}
        /* ===== 我的报告侧滑面板 ===== */
        .myreports-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:10002;display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;}
        .myreports-overlay.show{opacity:1;pointer-events:auto;}
        .myreports-panel{width:420px;max-width:90vw;height:100%;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.1);display:flex;flex-direction:column;transform:translateX(20px);transition:transform .3s cubic-bezier(.4,0,.2,1),background .25s;}
        .myreports-overlay.show .myreports-panel{transform:translateX(0);}
        .myreports-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #eee;flex-shrink:0;transition:border-color .25s;}
        .myreports-header h2{font-size:18px;font-weight:700;color:#222;display:flex;align-items:center;gap:8px;transition:color .25s;}
        .myreports-close{width:32px;height:32px;border-radius:50%;border:none;background:#f0f2f5;color:#666;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
        .myreports-close:hover{background:#e4e6eb;color:#333;}
        .myreports-body{flex:1;overflow-y:auto;padding:12px;}
        .myreports-loading{text-align:center;padding:40px 0;color:#888;font-size:14px;}
        .myreports-empty{text-align:center;padding:60px 20px;color:#666;font-size:14px;}
        .myreports-item{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;background:#f8f9fc;border-radius:10px;border:1px solid #e4e6eb;cursor:pointer;transition:all .2s;}
        .myreports-item:hover{background:#f0f1f8;border-color:#6c5ce7;transform:translateX(4px);}
        .myreports-item-icon{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
        .myreports-item-info{flex:1;min-width:0;}
        .myreports-item-title{font-size:13px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .25s;}
        .myreports-item-meta{font-size:11px;color:#888;margin-top:3px;}
        .myreports-item-badge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;flex-shrink:0;}
        .myreports-item-badge.active{background:rgba(0,214,143,.15);color:#00a854;}
        .myreports-item-badge.expired{background:rgba(255,92,92,.15);color:#d63031;}
        /* dark overrides */
        body.dark .myreports-panel{background:#1a1c2e;box-shadow:-8px 0 40px rgba(0,0,0,.3);}
        body.dark .myreports-header{border-color:#2a2a44;}
        body.dark .myreports-header h2{color:#d0d0dc;}
        body.dark .myreports-close{background:#2a2a44;color:#999;}
        body.dark .myreports-close:hover{background:#444466;color:#fff;}
        body.dark .myreports-item{background:#22223a;border-color:#333355;}
        body.dark .myreports-item:hover{background:#2a2a48;border-color:#6c5ce7;}
        body.dark .myreports-item-title{color:#d0d0dc;}

    <script type="module">
        // 版本号: 20260522-1608
        
        // 配置
        const SUPABASE_URL = 'https://ijamfnfbypalayjgagrb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqYW1mbmZieXBhbGF5amdhZ3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTkwMzgsImV4cCI6MjA5NDc5NTAzOH0.HGol63UNswYqLwiaNNv2yCUXayz8expgonYsi517rbo';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== 用户认证模块 =====
        let authUser = null;
        let authMode = 'signin'; // 'signin' | 'register' | 'recovery'

        // 确保 profile 表记录存在
        async function ensureAuthProfile(userId, email) {
            const displayName = email.split('@')[0];
            try {
                const { error } = await supabase.from('profiles').upsert({
                    id: userId, email, display_name: displayName,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });
                if (error) console.warn('Profile upsert warning:', error.message);
            } catch(e) { console.warn('Profile upsert error:', e); }
        }

        // 判断错误类型
        function getAuthErrorType(error) {
            if (!error) return 'none';
            const msg = (error.message || '').toLowerCase();
            if (msg.includes('already registered') || msg.includes('user already')) return 'registered';
            if (msg.includes('invalid login') || msg.includes('invalid credentials')) return 'wrong_password';
            if (msg.includes('rate limit') || msg.includes('too many')) return 'rate_limit';
            return 'other';
        }

        // 登录/注册
        async function doAuthSignUp(email, password) {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (!error && data.user) { await ensureAuthProfile(data.user.id, email); }
            return { data, error };
        }

        async function doAuthSignIn(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (!error && data.user) { await ensureAuthProfile(data.user.id, data.user.email || email); }
            return { data, error };
        }

        async function doAuthResetPassword(email) {
            const recoveryPath = window.location.origin + window.location.pathname + '?recovery=true';
            const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: recoveryPath });
            return { error };
        }

        async function doAuthSignOut() {
            const { error } = await supabase.auth.signOut();
            return { error };
        }

        function doAuthUpdatePassword(newPassword) {
            return supabase.auth.updateUser({ password: newPassword });
        }

        // 获取当前用户（页面刷新恢复登录态）
        async function loadAuthSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                updateAuthUI(session?.user || null);
                // 密码重置链接回调
                if (session?.user && window.location.search.includes('recovery=true')) {
                    setTimeout(() => { showAuthModal(); switchAuthMode('recovery'); }, 300);
                }
            } catch(e) { console.warn('Auth session load error:', e); }
        }

        // 监听认证状态变化
        supabase.auth.onAuthStateChange((event, session) => {
            updateAuthUI(session?.user || null);
        });

        function updateAuthUI(user) {
            authUser = user;
            const loginBtn = document.getElementById('loginBtn');
            const userBtn = document.getElementById('userBtn');
            const dropdown = document.getElementById('userDropdown');

            if (user) {
                const email = user.email || '';
                const initial = email.charAt(0).toUpperCase() || 'U';
                const displayName = email.split('@')[0];
                document.getElementById('userAvatar').textContent = initial;
                document.getElementById('userDisplayName').textContent = displayName;
                document.getElementById('userDropdownEmail').textContent = email;
                if (loginBtn) loginBtn.style.display = 'none';
                if (userBtn) userBtn.style.display = 'flex';
            } else {
                if (loginBtn) loginBtn.style.display = '';
                if (userBtn) userBtn.style.display = 'none';
                if (dropdown) dropdown.classList.remove('show');
            }
            // 同步身份到 localStorage，刷新协作光标标识
            syncIdentityToStorage();
            // 登录后刷新协作光标
            refreshCursorIdentity();
        }

        // 弹窗控制
        function showAuthModal() {
            hideAuthDropdown();
            resetAuthForm();
            document.getElementById('authOverlay').classList.add('show');
        }

        function hideAuthModal() {
            document.getElementById('authOverlay').classList.remove('show');
        }

        function resetAuthForm() {
            authMode = 'signin';
            document.getElementById('authTitle').textContent = '登录';
            document.getElementById('authSubtitle').textContent = '输入邮箱登录，未注册将自动创建账号';
            document.getElementById('authEmailLabel').textContent = '邮箱';
            document.getElementById('authPasswordLabel').textContent = '密码';
            document.getElementById('authConfirmField').style.display = 'none';
            document.getElementById('authSubmitBtn').textContent = '继续';
            document.getElementById('authForgotLink').style.display = 'none';
            document.getElementById('authModeSwitch').innerHTML = '还没有账号？<span onclick="switchAuthMode(\'register\')">立即注册</span>';
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authConfirmPassword').value = '';
            hideAuthMsg();
        }

        function switchAuthMode(mode) {
            authMode = mode;
            hideAuthMsg();
            if (mode === 'recovery') {
                document.getElementById('authTitle').textContent = '设置新密码';
                document.getElementById('authSubtitle').textContent = '请输入您的新密码';
                document.getElementById('authEmailLabel').textContent = '邮箱';
                document.getElementById('authEmail').disabled = true;
                document.getElementById('authEmail').value = authUser ? authUser.email || '' : '';
                document.getElementById('authPasswordLabel').textContent = '新密码';
                document.getElementById('authConfirmField').style.display = 'block';
                document.getElementById('authConfirmLabel').textContent = '确认密码';
                document.getElementById('authSubmitBtn').textContent = '更新密码';
                document.getElementById('authForgotLink').style.display = 'none';
                document.getElementById('authModeSwitch').innerHTML = '<span onclick="hideAuthModal()">取消</span>';
            } else if (mode === 'register') {
                document.getElementById('authTitle').textContent = '注册';
                document.getElementById('authSubtitle').textContent = '创建账号，登录后可使用完整功能';
                document.getElementById('authEmailLabel').textContent = '邮箱';
                document.getElementById('authEmail').disabled = false;
                document.getElementById('authPasswordLabel').textContent = '密码';
                document.getElementById('authConfirmField').style.display = 'block';
                document.getElementById('authSubmitBtn').textContent = '注册';
                document.getElementById('authForgotLink').style.display = 'none';
                document.getElementById('authModeSwitch').innerHTML = '已有账号？<span onclick="switchAuthMode(\'signin\')">去登录</span>';
            } else {
                document.getElementById('authTitle').textContent = '登录';
                document.getElementById('authSubtitle').textContent = '输入邮箱登录，未注册将自动创建账号';
                document.getElementById('authEmail').disabled = false;
                document.getElementById('authConfirmField').style.display = 'none';
                document.getElementById('authSubmitBtn').textContent = '继续';
                document.getElementById('authForgotLink').style.display = document.getElementById('authMsg').classList.contains('show') && document.getElementById('authMsg').classList.contains('error') && authMode === 'signin' ? '' : 'none';
                document.getElementById('authModeSwitch').innerHTML = '还没有账号？<span onclick="switchAuthMode(\'register\')">立即注册</span>';
            }
        }

        function showAuthMsg(type, text) {
            const el = document.getElementById('authMsg');
            el.className = 'auth-msg show ' + type;
            el.textContent = text;
        }

        function hideAuthMsg() {
            const el = document.getElementById('authMsg');
            el.className = 'auth-msg';
            el.textContent = '';
            document.getElementById('authForgotLink').style.display = 'none';
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            // 密码重置模式
            if (authMode === 'recovery') {
                const confirmPwd = document.getElementById('authConfirmPassword').value.trim();
                if (!password) { showAuthMsg('error', '请输入新密码'); return; }
                if (password !== confirmPwd) { showAuthMsg('error', '两次密码输入不一致'); return; }
                if (password.length < 6) { showAuthMsg('error', '密码长度不能少于 6 位'); return; }
                const btn = document.getElementById('authSubmitBtn');
                btn.disabled = true; btn.textContent = '请稍候...';
                try {
                    const { error } = await supabase.auth.updateUser({ password });
                    if (error) { showAuthMsg('error', error.message || '更新失败'); btn.disabled = false; btn.textContent = '更新密码'; return; }
                    hideAuthModal();
                    // 清除 URL 中的 recovery 参数
                    const url = new URL(window.location);
                    url.searchParams.delete('recovery');
                    window.history.replaceState({}, '', url);
                } catch(e) { showAuthMsg('error', e.message || '更新失败'); btn.disabled = false; btn.textContent = '更新密码'; }
                return;
            }

            if (!email || !password) { showAuthMsg('error', '请输入邮箱和密码'); return; }

            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true;
            btn.textContent = '请稍候...';
            hideAuthMsg();

            try {
                if (authMode === 'register') {
                    // 注册模式：确认密码检查
                    const confirmPwd = document.getElementById('authConfirmPassword').value.trim();
                    if (password !== confirmPwd) {
                        showAuthMsg('error', '两次密码输入不一致');
                        btn.disabled = false;
                        btn.textContent = '注册';
                        return;
                    }
                    if (password.length < 6) {
                        showAuthMsg('error', '密码长度不能少于 6 位');
                        btn.disabled = false;
                        btn.textContent = '注册';
                        return;
                    }
                    const { data, error } = await doAuthSignUp(email, password);
                    if (error) {
                        const errType = getAuthErrorType(error);
                        if (errType === 'registered') {
                            showAuthMsg('error', '该邮箱已注册，请直接登录');
                        } else if (errType === 'rate_limit') {
                            showAuthMsg('error', '操作太频繁，请稍等片刻再试');
                        } else {
                            showAuthMsg('error', error.message || '注册失败');
                        }
                        btn.disabled = false;
                        btn.textContent = '注册';
                        return;
                    }
                    // 注册成功，自动登录
                    if (data.user) updateAuthUI(data.user);
                    hideAuthModal();
                } else {
                    // 登录模式：先尝试登录（已有用户），失败时尝试注册（新用户）
                    const { data: signInData, error: signInError } = await doAuthSignIn(email, password);
                    if (!signInError) {
                        if (signInData.user) updateAuthUI(signInData.user);
                        hideAuthModal();
                        return;
                    }
                    // 登录失败 → 尝试注册（可能是新用户）
                    const { data: signUpData, error: signUpError } = await doAuthSignUp(email, password);
                    if (!signUpError) {
                        if (signUpData.user) updateAuthUI(signUpData.user);
                        hideAuthModal();
                        return;
                    }
                    const errType = getAuthErrorType(signUpError);
                    if (errType === 'registered') {
                        // 已注册但登录失败 → 密码错误
                        showAuthMsg('error', '密码错误，请检查后重试');
                        document.getElementById('authForgotLink').style.display = '';
                    } else if (errType === 'rate_limit') {
                        showAuthMsg('error', '操作太频繁，请稍等片刻再试');
                    } else {
                        showAuthMsg('error', signUpError.message || '登录失败');
                    }
                }
            } catch(e) {
                showAuthMsg('error', e.message || '操作失败');
            } finally {
                if (document.getElementById('authOverlay').classList.contains('show')) {
                    btn.disabled = false;
                    btn.textContent = authMode === 'register' ? '注册' : '继续';
                }
            }
        }

        async function handleForgotPassword() {
            const email = document.getElementById('authEmail').value.trim();
            if (!email) {
                showAuthMsg('error', '请先输入邮箱地址');
                return;
            }
            const linkEl = document.getElementById('authForgotLink');
            linkEl.style.pointerEvents = 'none';
            linkEl.style.opacity = '0.5';
            try {
                const { error } = await doAuthResetPassword(email);
                if (error) {
                    showAuthMsg('error', error.message || '发送重置邮件失败');
                } else {
                    showAuthMsg('success', '密码重置链接已发送，请查收邮件');
                    document.getElementById('authForgotLink').style.display = 'none';
                }
            } catch(e) {
                showAuthMsg('error', '发送失败，请稍后重试');
            } finally {
                linkEl.style.pointerEvents = '';
                linkEl.style.opacity = '';
            }
        }

        function getEffectiveIdentity() {
            if (authUser && authUser.email) {

                    id: authUser.id,
                    name: authUser.email.split('@')[0],
                    email: authUser.email,
                    isGuest: false
                };

            // 未登录 → 使用 localStorage 持久化的访客 ID
            let guestId = localStorage.getItem('uirel-guest-id');

                guestId = 'guest_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('uirel-guest-id', guestId);
            }
            let guestName = localStorage.getItem('uirel-guest-name');
            if (!guestName) {
                guestName = '访客' + Math.floor(Math.random() * 100);
                localStorage.setItem('uirel-guest-name', guestName);
            }
            return {
                id: guestId,
                name: guestName,
                email: null,
                isGuest: true
            };
        }

        async function updateMyCursor(x, y) {
            if (cursorThrottleTimer) return;
            cursorThrottleTimer = setTimeout(async () => {
                cursorThrottleTimer = null;
                const idn = getEffectiveIdentity();
                try {
                    const { error } = await supabase.from('report_cursors').upsert({
                        report_id: reportId,
                        user_id: idn.id,

                        x, y,
                        color: myColor,
                        last_seen: new Date().toISOString()
                    }, { 
                        onConflict: 'report_id,user_id',
                        ignoreDuplicates: false 
                    });
                    if (error) console.error('cursor upsert error:', error);
                } catch(e) { console.error('cursor update error:', e); }
            }, CURSOR_UPDATE_INTERVAL);
        }

        function renderRemoteUsers(cursors) {
            const idn = getEffectiveIdentity();
            const container = document.getElementById('collabUsers');
            const validCursors = cursors.filter(c => c.user_id !== idn.id && Date.now() - new Date(c.last_seen).getTime() < CURSOR_EXPIRE_SECONDS * 1000);
            
            // 更新头像列表
            const existingSpan = container.parentElement.querySelector('.collab-count');
            if (existingSpan) existingSpan.remove();
            
            if (validCursors.length > 0) {
                container.insertAdjacentHTML('beforebegin', `<span class="collab-count" style="font-size:11px;color:#888;margin-right:4px;">+${validCursors.length}人</span>`);
            }
            container.innerHTML = validCursors.map(c => 
                `<div class="collab-avatar" style="background:${c.color};" title="${c.username}">${c.username.slice(0, 1)}</div>`
            ).join('');

            // 更新远程光标
            const cursorContainer = document.getElementById('cursorContainer');
            validCursors.forEach(c => {
                if (!remoteCursors[c.user_id]) {
                    remoteCursors[c.user_id] = document.createElement('div');
                    remoteCursors[c.user_id].className = 'remote-cursor';
                    remoteCursors[c.user_id].innerHTML = `<div class="cursor-pointer" style="color:${c.color};"></div><div class="cursor-label" style="background:${c.color};">${c.username}</div>`;
                    cursorContainer.appendChild(remoteCursors[c.user_id]);
                    showCollabToast(`${c.username} 加入了`);
                }
                remoteCursors[c.user_id].style.left = c.x + 'px';
                remoteCursors[c.user_id].style.top = c.y + 'px';
            });

            // 移除过期光标
            Object.keys(remoteCursors).forEach(uid => {
                if (!validCursors.find(c => c.user_id === uid)) {
                    remoteCursors[uid].remove();
                    delete remoteCursors[uid];
                }
            });
        }

        async function startCollaboration() {

            document.getElementById('cursorContainer').appendChild(myCursorEl);

            // 监听光标变化
            document.addEventListener('mousemove', e => {
                if (myCursorEl) {
                    myCursorEl.style.left = e.clientX + 'px';
                    myCursorEl.style.top = e.clientY + 'px';

                if (reportId) updateMyCursor(e.clientX, e.clientY);
            });

            // 定时心跳保活
            heartbeatTimer = setInterval(async () => {
                const hidn = getEffectiveIdentity();
                try {
                    // 先更新自己的在线状态
                    const { error: upsertErr } = await supabase.from('report_cursors').upsert({
                        report_id: reportId,
                        user_id: hidn.id,
                        username: hidn.name,
                        x: myCursorEl ? parseInt(myCursorEl.style.left) || 0 : 0,
                        y: myCursorEl ? parseInt(myCursorEl.style.top) || 0 : 0,
                        color: myColor,
                        last_seen: new Date().toISOString()
                    }, { 
                        onConflict: 'report_id,user_id',
                        ignoreDuplicates: false 
                    });
                    if (upsertErr) console.error('heartbeat upsert error:', upsertErr);
                    
                    // 再拉取所有光标
                    const { data: cursors } = await supabase
                        .from('report_cursors')
                        .select('*')
                        .eq('report_id', reportId);
                    if (cursors) renderRemoteUsers(cursors);
                } catch(e) { console.error('heartbeat error:', e); }
            }, 500);

            // 初次加载
            try {
                const { data: cursors } = await supabase
                    .from('report_cursors')
                    .select('*')
                    .eq('report_id', reportId);
                if (cursors) renderRemoteUsers(cursors);

                        .eq('report_id', reportId);
                } catch(e) {}
            });
        }

        async function loadMyReports() {
            const body = document.getElementById('myReportsBody');
            body.innerHTML = '<div class="myreports-loading">加载中...</div>';

            const idn = getEffectiveIdentity();
            try {
                // 查询当前用户参与的报告（通过 report_visits 表和 checked_by 身份）
                const userId = idn.id;
                const userName = idn.name;

                // 尝试从 report_visits 表获取访问记录
                let reportIds = [];
                let visitMap = {};

                try {
                    const { data: visits } = await supabase
                        .from('report_visits')
                        .select('*')
                        .eq('user_id', userId)
                        .order('visited_at', { ascending: false })
                        .limit(50);

                    if (visits && visits.length > 0) {
                        visits.forEach(v => {
                            reportIds.push(v.report_id);
                            visitMap[v.report_id] = v.visited_at;
                        });
                    }
                } catch(e) {
                    // report_visits 表可能不存在，fallback 到当前报告
                    console.warn('report_visits table may not exist:', e.message);
                }

                // 如果没有访问记录，至少加入当前报告
                if (reportIds.length === 0 && reportId) {
                    reportIds.push(reportId);
                }

                // 批量查询报告
                if (reportIds.length === 0) {
                    body.innerHTML = '<div class="myreports-empty">还没有访问过任何报告<br><span style="font-size:12px;color:#888;">打开一个报告链接即可自动记录</span></div>';
                    return;
                }

                const { data: reports } = await supabase
                    .from('reports')
                    .select('*')
                    .in('report_id', reportIds)
                    .order('created_at', { ascending: false });

                if (!reports || reports.length === 0) {
                    body.innerHTML = '<div class="myreports-empty">暂无历史报告</div>';
                    return;
                }

                // 计算每个报告的 bug 统计
                const reportIdList = reports.map(r => r.report_id);
                const { data: allBugsData } = await supabase
                    .from('bugs')
                    .select('report_id, checked')
                    .in('report_id', reportIdList);

                const bugStats = {};
                if (allBugsData) {
                    allBugsData.forEach(b => {
                        if (!bugStats[b.report_id]) bugStats[b.report_id] = { total: 0, fixed: 0 };
                        bugStats[b.report_id].total++;
                        if (b.checked) bugStats[b.report_id].fixed++;
                    });
                }

                body.innerHTML = reports.map(r => {
                    const titleParts = (r.title || '未命名报告').split('‖');
                    const title = titleParts[0];
                    const stats = bugStats[r.report_id] || { total: 0, fixed: 0 };
                    const badgeClass = 'active';
                    const badgeText = `${stats.fixed}/${stats.total} 已修复`;

                    return `
                    <div class="myreports-item" onclick="window.open('?id=${r.report_id}','_self')">
                        <div class="myreports-item-icon">📄</div>
                        <div class="myreports-item-info">
                            <div class="myreports-item-title">${title}</div>
                            <div class="myreports-item-meta">${new Date(r.created_at).toLocaleString('zh-CN')} · ${r.task_count || 0} 任务</div>
                        </div>
                        <span class="myreports-item-badge ${badgeClass}">${badgeText}</span>
                    </div>`;
                }).join('');

            } catch(e) {
                console.error('加载我的报告失败:', e);
                body.innerHTML = '<div class="myreports-empty">加载失败: ' + (e.message || '未知错误') + '</div>';
            }
        }
