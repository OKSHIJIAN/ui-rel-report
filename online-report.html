        // 页面加载
        async function init() {
            if (!reportId) {
                document.getElementById('loadingOverlay').innerHTML = '<div style="text-align:center;"><h2>无效的报告链接</h2><p>请检查链接是否正确</p></div>';
                return;
            }

            try {
                // 加载报告数据
                const { data: report, error } = await supabase
                    .from('reports')
                    .select('*')
                    .eq('report_id', reportId)
                    .single();

                if (error || !report) {
                    document.getElementById('loadingOverlay').innerHTML = '<div style="text-align:center;"><h2>报告已过期</h2><p>报告超过 30 天已被自动清理，请重新生成</p></div>';
                    return;
                }

                // 加载 Bug 数据
                const { data: bugs } = await supabase
                    .from('bugs')
                    .select('*')
                    .eq('report_id', reportId);

                allBugs = bugs || [];
                reportData = report;

                document.getElementById('reportTitle').textContent = report.title;
                document.getElementById('reportDate').textContent = new Date(report.created_at).toLocaleString('zh-CN');
                document.getElementById('reportDate').title = '点击查看此文件的所有历史报告';
                document.getElementById('reportDate').onclick = showFileHistory;
                
                // 解析 title 中的用户名（‖ 分隔：title‖username）
                var titleParts = report.title.split('‖');
                if (titleParts.length > 1) {
                    document.getElementById('reportTitle').textContent = titleParts[0];
                    document.getElementById('reportUser').textContent = titleParts[1];
                } else {
                    document.getElementById('reportTitle').textContent = report.title;
                    document.getElementById('reportUser').textContent = '';
                }
                
                document.getElementById('navTaskCount').textContent = report.task_count;
                document.getElementById('navBugCount').textContent = allBugs.filter(b => !b.checked).length;
                document.getElementById('navFixedCount').textContent = allBugs.filter(b => b.checked).length;

                updateBugProgress();
                renderTasks();

                // 记录本次访问
                recordReportVisit();

                // 加载所有 Bug 的评论计数
                loadAllCommentCounts();

                // 订阅实时更新
                supabase.channel('bugs-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'bugs', filter: `report_id=eq.${reportId}` }, handleBugChange)
                    .subscribe();

                // 订阅评论实时更新
                supabase.channel('comments-changes')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bug_comments', filter: `report_id=eq.${reportId}` }, handleCommentChange)
                    .subscribe();

                // 启动协作功能
                startCollaboration();

            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('loadingOverlay').innerHTML = '<div style="text-align:center;"><h2>加载失败</h2><p>' + err.message + '</p></div>';
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = '离线';
            }

            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // 处理 Bug 状态变更
        async function handleBugChange(payload) {
            const bug = payload.new;
            if (!bug) return;

            // 更新本地数据
            const idx = allBugs.findIndex(b => b.id === bug.id);
            if (idx >= 0) {
                allBugs[idx] = bug;
            }

            // 更新 UI
            const cb = document.querySelector(`.r-bug-cb[data-id="${bug.bug_id}"][data-task="${bug.task_index}"]`);
            if (cb) {
                cb.checked = bug.checked;
                updateBugUI(cb);
            }

            updateStats();
            updateBugProgress();
        }

        // 处理实时评论变更
        async function handleCommentChange(payload) {
            const comment = payload.new;
            if (!comment) return;

            // 找到对应的 bug（通过 bug_id = bug 记录 id）
            const bug = allBugs.find(b => b.id === comment.bug_id);
            if (!bug) return;

            // 重新加载该 bug 的评论
            const taskIndex = bug.task_index;
            const bugId = bug.bug_id;
            const section = document.getElementById('comment-section-' + taskIndex + '-' + bugId);
            if (section && section.classList.contains('open')) {
                await loadBugComments(taskIndex, bugId);
            }
            // 更新评论计数
            const key = taskIndex + '-' + bugId;
            const cached = commentsCache[key];
            const countEl = document.getElementById('comment-count-' + taskIndex + '-' + bugId);
            if (countEl) {
                const count = (cached ? cached.length : 0) + 1;
                countEl.textContent = ' ' + count;
            }
        }

        // 切换 Bug 状态
        async function toggleBug(taskIndex, bugId, checkbox) {
            const bug = allBugs.find(b => b.task_index === taskIndex && b.bug_id === bugId);
            if (!bug) return;

            const newChecked = checkbox.checked;
            const idn = getEffectiveIdentity();
            const username = idn.name;

            // 乐观更新 - 先更新本地数据
            bug.checked = newChecked;
            bug.checked_by = username;
            bug.checked_at = new Date().toISOString();
            updateBugUI(checkbox);
            updateStats();
            updateBugProgress();

            const { error } = await supabase
                .from('bugs')
                .update({ 
                    checked: newChecked, 
                    checked_by: username,
                    checked_at: new Date().toISOString()
                })
                .eq('id', bug.id);

            if (error) {
                checkbox.checked = !newChecked;
                bug.checked = !newChecked;
                updateBugUI(checkbox);
                updateStats();
                updateBugProgress();
                alert('更新失败: ' + error.message);
            }
        }

        function updateBugUI(cb) {
            const taskIndex = cb.dataset.task;
            const bugId = cb.dataset.id;
            const checked = cb.checked;

            const dot = document.querySelector(`.r-bug-dot[data-id="${bugId}"][data-task="${taskIndex}"]`);
            if (dot) {
                dot.classList.toggle('checked-green', checked);
                dot.classList.toggle('unchecked-red', !checked);
            }

            const marker = document.querySelector(`.r-bug-marker[data-id="${bugId}"][data-task="${taskIndex}"]`);
            if (marker) marker.classList.toggle('dimmed', !checked);

            // 更新表格中 Bug ID 颜色
            const tr = cb.closest('tr');
            const tdId = tr.querySelector('.r-bug-id-td');
            if (tdId) tdId.style.color = checked ? '#00d68f' : '#ff5c5c';

            // 立即更新状态文字列
            const statusTd = tr.querySelector('.r-bug-status-td');
            if (statusTd) {
                statusTd.textContent = checked ? '✓ 已修复' : '待处理';
                statusTd.style.color = checked ? '#00d68f' : '#ff5c5c';
            }

            // 更新该任务的 "Bug 标记列表 (X/Y 已修复)" 节标题
            const taskSection = document.getElementById('task-' + taskIndex);
            if (taskSection) {
                const sectionTitle = taskSection.querySelector('.bug-section-title');
                if (sectionTitle) {
                    const taskBugs = allBugs.filter(b => b.task_index === parseInt(taskIndex));
                    const taskChecked = taskBugs.filter(b => b.checked).length;
                    sectionTitle.textContent = `Bug 标记列表 (${taskChecked}/${taskBugs.length} 已修复)`;
                }
            }
        }

        function updateStats() {
            const checked = allBugs.filter(b => b.checked).length;
            const total = allBugs.length;
            document.getElementById('navBugCount').textContent = total - checked;
            document.getElementById('navFixedCount').textContent = checked;
        }

        function updateBugProgress() {
            const total = allBugs.length;
            const checked = allBugs.filter(b => b.checked).length;
            const pct = total > 0 ? Math.round(checked / total * 100) : 0;
            document.getElementById('bugProgress').textContent = `修复进度: ${checked}/${total} (${pct}%)`;
        }

        // ===== Bug 评论系统 =====
        // 评论缓存 { 'taskIndex-bugId': [{...}] }
        const commentsCache = {};

        async function toggleBugComments(taskIndex, bugId) {
            const row = document.getElementById('comment-row-' + taskIndex + '-' + bugId);
            const section = document.getElementById('comment-section-' + taskIndex + '-' + bugId);
            if (!row || !section) return;

            const isOpen = row.style.display !== 'none';
            if (isOpen) {
                row.style.display = 'none';
                section.classList.remove('open');
            } else {
                row.style.display = '';
                section.classList.add('open');
                await loadBugComments(taskIndex, bugId);
                // 聚焦输入框
                setTimeout(() => {
                    const input = document.getElementById('comment-input-' + taskIndex + '-' + bugId);
                    if (input) input.focus();
                }, 100);
            }
        }

        async function loadBugComments(taskIndex, bugId) {
            const key = taskIndex + '-' + bugId;
            const listEl = document.getElementById('comment-list-' + taskIndex + '-' + bugId);
            const countEl = document.getElementById('comment-count-' + taskIndex + '-' + bugId);
            if (!listEl) return;

            try {
                const bug = allBugs.find(b => b.task_index === taskIndex && b.bug_id === bugId);
                const bugRecordId = bug ? bug.id : null;
                if (!bugRecordId) {
                    listEl.innerHTML = '<div style="font-size:11px;color:#666;">无法加载评论</div>';
                    return;
                }

                const { data: comments, error } = await supabase
                    .from('bug_comments')
                    .select('*')
                    .eq('bug_id', bugRecordId)
                    .order('created_at', { ascending: true });

                if (error) {
                    listEl.innerHTML = '<div style="font-size:11px;color:#666;">评论加载失败</div>';
                    console.error('load comments error:', error);
                    return;
                }

                commentsCache[key] = comments || [];

                if (countEl) {
                    countEl.textContent = comments && comments.length > 0 ? ' ' + comments.length : '';
                }

                if (!comments || comments.length === 0) {
                    listEl.innerHTML = '<div style="font-size:11px;color:#666;text-align:center;padding:8px;">暂无评论</div>';
                    return;
                }

                listEl.innerHTML = comments.map(c => {
                    const author = c.author_name || '匿名';
                    const time = new Date(c.created_at).toLocaleString('zh-CN');
                    return `
                    <div class="bug-comment-item">
                        <div class="bug-comment-avatar">${author.slice(0,1).toUpperCase()}</div>
                        <div class="bug-comment-content">
                            <div class="bug-comment-author">${author}<span class="time">${time}</span></div>
                            <div class="bug-comment-text">${escapeHtml(c.content || '')}</div>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) {
                console.error('load comments error:', e);
                listEl.innerHTML = '<div style="font-size:11px;color:#666;">评论加载出错</div>';
            }
        }

        async function submitBugComment(taskIndex, bugId) {
            const input = document.getElementById('comment-input-' + taskIndex + '-' + bugId);
            const sendBtn = input ? input.nextElementSibling : null;
            if (!input) return;

            const content = input.value.trim();
            if (!content) return;

            const idn = getEffectiveIdentity();
            const authorName = idn.name;
            const authorId = idn.id;

            const bug = allBugs.find(b => b.task_index === taskIndex && b.bug_id === bugId);
            const bugRecordId = bug ? bug.id : null;
            if (!bugRecordId) return;

            if (sendBtn) sendBtn.disabled = true;
            input.disabled = true;

            try {
                const { error } = await supabase.from('bug_comments').insert({
                    bug_id: bugRecordId,
                    report_id: reportId,
                    author_id: authorId,
                    author_name: authorName,
                    content: content,
                    created_at: new Date().toISOString()
                });

                if (error) {
                    // 表可能不存在
                    if (error.message && error.message.includes('does not exist')) {
                        alert('评论功能需要数据库支持。请在 Supabase 中创建 bug_comments 表。');
                    } else {
                        alert('评论发送失败: ' + error.message);
                    }
                } else {
                    input.value = '';
                    await loadBugComments(taskIndex, bugId);
                }
            } catch(e) {
                alert('评论发送出错: ' + (e.message || '未知错误'));
            } finally {
                if (sendBtn) sendBtn.disabled = false;
                input.disabled = false;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 初始化时加载所有评论计数
        async function loadAllCommentCounts() {
            try {
                const bugIds = allBugs.map(b => b.id);
                if (bugIds.length === 0) return;

                const { data: counts } = await supabase
                    .from('bug_comments')
                    .select('bug_id')
                    .in('bug_id', bugIds);

                if (!counts) return;

                // 统计每个 bug 的评论数
                const countMap = {};
                counts.forEach(c => {
                    countMap[c.bug_id] = (countMap[c.bug_id] || 0) + 1;
                });

                // 更新 UI：更新计数 + 有评论的自动展开
                Object.keys(countMap).forEach(async (bugRecordId) => {
                    const bug = allBugs.find(b => b.id === bugRecordId);
                    if (!bug) return;
                    const ti = bug.task_index;
                    const bi = bug.bug_id;
                    const count = countMap[bugRecordId];
                    const el = document.getElementById('comment-count-' + ti + '-' + bi);
                    if (el && count > 0) {
                        el.textContent = ' ' + count;
                        // 有评论 → 自动展开评论区域
                        const row = document.getElementById('comment-row-' + ti + '-' + bi);
                        const section = document.getElementById('comment-section-' + ti + '-' + bi);
                        if (row && section && row.style.display === 'none') {
                            row.style.display = '';
                            section.classList.add('open');
                            await loadBugComments(ti, bi);
                        }
                    }
                });
            } catch(e) {
                // 表可能不存在，忽略
            }
        }

        // 暴露到全局
        window.toggleBugComments = toggleBugComments;
        window.submitBugComment = submitBugComment;
        // ===== Bug 评论系统结束 =====

        // 渲染任务（含文件夹机制）
        function renderTasks() {
            const navList = document.getElementById('navList');
            const contentArea = document.getElementById('contentArea');
            
            navList.innerHTML = '';
            contentArea.innerHTML = '';

            if (!reportData || !reportData.task_data) {
                contentArea.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">暂无任务数据</div>';
                return;
            }

            const tasks = reportData.task_data;

            // ★ 预处理：检测是否有斜杠路径，建立文件夹分组
            const hasFolders = tasks.some(t => (t.frameName || '').includes('/'));
            let folderGroups = {};  // { folderName: [taskIndex, ...] }
            let standaloneTasks = []; // 无斜杠的顶级任务索引

            if (hasFolders) {
                tasks.forEach((task, i) => {
                    const name = task.frameName || '';
                    const slashIdx = name.lastIndexOf('/');
                    if (slashIdx > 0) {
                        const folder = name.substring(0, slashIdx);
                        if (!folderGroups[folder]) folderGroups[folder] = [];
                        folderGroups[folder].push(i);
                    } else {
                        standaloneTasks.push(i);
                    }
                });
            }

            // ★ 构建侧边栏导航
            if (hasFolders) {
                // 先渲染文件夹
                Object.keys(folderGroups).forEach(folderName => {
                    const indices = folderGroups[folderName];
                    const totalBugs = indices.reduce((sum, idx) => sum + (tasks[idx].bugs || 0), 0);
                    const taskBugsInFolder = indices.reduce((sum, idx) => {
                        const tb = allBugs.filter(b => b.task_index === idx);
                        return sum + tb.filter(b => b.checked).length;
                    }, 0);
                    const uncheckedInFolder = totalBugs - taskBugsInFolder;

                    const folderEl = document.createElement('div');
                    folderEl.className = 'nav-folder';
                    folderEl.innerHTML = `
                        <div class="nav-folder-header" onclick="toggleNavFolder(this)">
                            <span class="nav-folder-arrow">▶</span>
                            <span class="nav-folder-icon">📁</span>
                            <span class="nav-folder-name">${escapeHtml(folderName)}</span>
                            <span class="nav-folder-count">${indices.length}项 · ${totalBugs}bug</span>
                        </div>
                        <div class="nav-folder-body"></div>
                    `;
                    const body = folderEl.querySelector('.nav-folder-body');
                    indices.forEach(idx => {
                        const task = tasks[idx];
                        const displayName = (task.frameName || '').substring(task.frameName.lastIndexOf('/') + 1) || ('任务 ' + (idx + 1));
                        const itemEl = document.createElement('div');
                        itemEl.className = 'nav-item is-child';
                        itemEl.dataset.target = 'task-' + idx;
                        itemEl.onclick = () => scrollToTask('task-' + idx);
                        itemEl.innerHTML = `
                            <div class="nav-thumb-wrap">${task.thumb || ''}</div>
                            <div class="nav-info">
                                <div class="nav-title">${escapeHtml(displayName)}</div>
                                <div class="nav-meta">${task.bugs || 0} 个 Bug</div>
                            </div>
                        `;
                        body.appendChild(itemEl);
                    });
                    navList.appendChild(folderEl);
                });

                // 再渲染无斜杠的顶级任务
                standaloneTasks.forEach(i => {
                    const task = tasks[i];
                    const itemEl = document.createElement('div');
                    itemEl.className = 'nav-item';
                    itemEl.dataset.target = 'task-' + i;
                    itemEl.onclick = () => scrollToTask('task-' + i);
                    itemEl.innerHTML = `
                        <div class="nav-thumb-wrap">${task.thumb || ''}</div>
                        <div class="nav-info">
                            <div class="nav-title">${escapeHtml(task.frameName || '任务 ' + (i + 1))}</div>
                            <div class="nav-meta">${task.bugs || 0} 个 Bug</div>
                        </div>
                    `;
                    navList.appendChild(itemEl);
                });
            } else {
                // 无文件夹 → 原样渲染
                tasks.forEach((task, i) => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'nav-item';
                    itemEl.dataset.target = 'task-' + i;
                    itemEl.onclick = () => scrollToTask('task-' + i);
                    itemEl.innerHTML = `
                        <div class="nav-thumb-wrap">${task.thumb || ''}</div>
                        <div class="nav-info">
                            <div class="nav-title">${escapeHtml(task.frameName || '任务 ' + (i + 1))}</div>
                            <div class="nav-meta">${task.bugs || 0} 个 Bug</div>
                        </div>
                    `;
                    navList.appendChild(itemEl);
                });
            }

            // ★ 内容区渲染（始终平铺）
            tasks.forEach((task, i) => {
                const section = document.createElement('section');
                section.className = 'task-section';
                section.id = 'task-' + i;

                const taskBugs = allBugs.filter(b => b.task_index === i);
                const checkedCount = taskBugs.filter(b => b.checked).length;
                const hasNoBugs = taskBugs.length === 0;

                section.innerHTML = `
                    <div class="task-header">
                        <div class="task-title-row">
                            <h2 class="task-title">${escapeHtml(task.frameName || '任务 ' + (i+1))}</h2>
                        </div>
                    </div>
                    ${hasNoBugs ? '<div class="no-bug-badge"><img src="nobugbadge.svg" alt="零 Bug" /></div>' : ''}
                    <div class="main-img-wrap">
                        <div class="img-pair" id="task-${i}-pair">
                            <img src="${task.designImg}" alt="设计稿" />
                            <img class="overlay-img" id="task-${i}-overlay" src="${task.screenshotImg}" />
                        </div>
                        <div class="img-controls">
                            <span style="font-size:11px;color:#888;">设计稿</span>
                            <input type="range" min="0" max="100" value="50" oninput="updateOverlay(this, ${i})" />
                            <span style="font-size:11px;color:#888;">截图</span>
                        </div>
                    </div>
                    ${taskBugs.length > 0 ? `
                    <div class="section-title bug-section-title">Bug 标记列表 (${checkedCount}/${taskBugs.length} 已修复)</div>
                    <table class="bug-table">
                        <thead><tr><th style="width:36px;"></th><th style="width:50px;">#ID</th><th>描述</th><th>状态</th><th style="width:50px;">优先级</th><th style="width:36px;"></th></tr></thead>
                        <tbody>
                            ${taskBugs.map(bug => {
                                var pri = bug.priority || 'P3';
                                var priColor = {P1:'#ff3b3b',P2:'#ff8c00',P3:'#e6a800'}[pri]||'#e6a800';
                                var priClass = 'pri-' + pri.toLowerCase();
                                return `
                            <tr>
                                <td><input type="checkbox" class="r-bug-cb" data-id="${bug.bug_id}" data-task="${i}" ${bug.checked ? 'checked' : ''} onchange="toggleBug(${i}, ${bug.bug_id}, this)" /></td>
                                <td class="r-bug-id-td" style="color:${bug.checked ? '#00d68f' : '#ff5c5c'}">#${bug.bug_id}</td>
                                <td>${escapeHtml(bug.text || '-')}</td>
                                <td class="r-bug-status-td" style="color:${bug.checked ? '#00d68f' : '#ff5c5c'}">${bug.checked ? '✓ 已修复' : '待处理'}</td>
                                <td><span class="pri-badge ${priClass}" style="display:inline-block;padding:1px 6px;font-size:10px;font-weight:700;font-family:JetBrains Mono,monospace;border-radius:3px;color:#fff;background:${priColor};">${pri}</span></td>
                                <td><span class="bug-comment-toggle" onclick="toggleBugComments(${i}, ${bug.bug_id})" title="评论">💬<span class="bug-comment-count" id="comment-count-${i}-${bug.bug_id}"></span></span></td>
                            </tr>
                            <tr class="bug-comment-row" id="comment-row-${i}-${bug.bug_id}" style="display:none;">
                                <td colspan="6" style="padding:0 12px 10px;">
                                    <div class="bug-comment-section" id="comment-section-${i}-${bug.bug_id}">
                                        <div class="bug-comment-list" id="comment-list-${i}-${bug.bug_id}"></div>
                                        <div class="bug-comment-input-wrap">
                                            <input class="bug-comment-input" id="comment-input-${i}-${bug.bug_id}" placeholder="添加评论..." onkeydown="if(event.key==='Enter')submitBugComment(${i}, ${bug.bug_id})" />
                                            <button class="bug-comment-send" onclick="submitBugComment(${i}, ${bug.bug_id})">发送</button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            `}).join('')}
                        </tbody>
                    </table>
                    ` : '<div style="color:#2A8E43;text-align:center;padding:20px;">代码完美，质量满分！</div>'}
                `;
                contentArea.appendChild(section);

                // 添加 Bug 标记点
                if (taskBugs.length > 0) {
                    const pair = section.querySelector('.img-pair');
                    taskBugs.forEach(bug => {
                        const pctX = bug.x / task.imgW * 100;
                        const pctY = bug.y / task.imgH * 100;
                        const marker = document.createElement('div');
                        marker.className = 'r-bug-marker' + (bug.checked ? '' : '');
                        marker.dataset.id = bug.bug_id;
                        marker.dataset.task = i;
                        marker.style.cssText = `left:${pctX}%;top:${pctY}%;`;
                        if (bug.checked) marker.classList.add('dimmed');
                        marker.innerHTML = `
                            <div class="r-bug-dot ${bug.checked ? 'checked-green' : ''}" data-id="${bug.bug_id}" data-task="${i}">
                                <span class="r-bug-num">${bug.bug_id}</span>
                            </div>
                        `;

                        let isDragging = false;
                        let dragOffsetX = 0, dragOffsetY = 0;
                        let startClientX = 0, startClientY = 0;

                        marker.addEventListener('mousedown', e => {
                            e.preventDefault();
                            isDragging = true;
                            marker.style.transition = 'none';
                            startClientX = e.clientX;
                            startClientY = e.clientY;

                            const onMove = ev => {
                                if (!isDragging) return;
                                dragOffsetX = ev.clientX - startClientX;
                                dragOffsetY = ev.clientY - startClientY;
                                marker.style.transform = `translate(calc(-50% + ${dragOffsetX}px), calc(-50% + ${dragOffsetY}px))`;
                                marker.style.zIndex = 20;
                            };

                            const onUp = () => {
                                if (!isDragging) return;
                                isDragging = false;
                                document.removeEventListener('mousemove', onMove);
                                document.removeEventListener('mouseup', onUp);
                                marker.style.transition = '';
                                marker.style.transform = '';
                                marker.style.zIndex = '';
                            };

                            document.addEventListener('mousemove', onMove);
                            document.addEventListener('mouseup', onUp);
                        });

                        pair.appendChild(marker);
                    });
                }
            });

            // 更新 Bug UI 状态
            document.querySelectorAll('.r-bug-cb').forEach(cb => {
                if (cb.checked) updateBugUI(cb);
            });

            // ★ 启动彩带观察器
            setupConfettiObserver();
        }

        // ===== 文件夹展开/折叠 =====
        function toggleNavFolder(headerEl) {
            const folder = headerEl.parentElement;
            folder.classList.toggle('open');
        }
        window.toggleNavFolder = toggleNavFolder;

        // ===== 彩带动效 =====
        let confettiCanvas = null;
        let confettiCtx = null;
        let confettiParticles = [];
        let confettiAnimId = null;
        const _confettiShown = {}; // 记录已播放过的 task ID

        function setupConfettiObserver() {
            if (!reportData || !reportData.task_data) return;
            const tasks = reportData.task_data;
            const sections = document.querySelectorAll('.task-section');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const sectionEl = entry.target;
                        const taskId = sectionEl.id; // 'task-0', 'task-1', ...
                        const idx = parseInt(taskId.split('-')[1]);
                        const taskBugs = allBugs.filter(b => b.task_index === idx);

                        // 只对零 Bug 的任务触发彩带
                        if (taskBugs.length === 0 && !_confettiShown[taskId]) {
                            _confettiShown[taskId] = true;
                            launchConfetti(sectionEl);
                        }
                    }
                });
            }, { threshold: 0.4 });

            sections.forEach(s => observer.observe(s));
        }

        function launchConfetti(targetEl) {
            // 确保 canvas 存在
            if (!confettiCanvas) {
                confettiCanvas = document.createElement('canvas');
                confettiCanvas.className = 'confetti-overlay';
                confettiCanvas.width = window.innerWidth;
                confettiCanvas.height = window.innerHeight;
                document.body.appendChild(confettiCanvas);
                confettiCtx = confettiCanvas.getContext('2d');
                window.addEventListener('resize', () => {
                    if (confettiCanvas) {
                        confettiCanvas.width = window.innerWidth;
                        confettiCanvas.height = window.innerHeight;
                    }
                });
            }

            // 生成粒子
            const colors = ['#ff5c5c','#ffc048','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff6348','#2ed573','#1e90ff','#ffa502'];
            const rect = targetEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < 120; i++) {
                confettiParticles.push({
                    x: cx,
                    y: cy,
                    vx: (Math.random() - 0.5) * 18,
                    vy: (Math.random() - 1.2) * 14,
                    w: Math.random() * 10 + 4,
                    h: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotV: (Math.random() - 0.5) * 15,
                    opacity: 1,
                    life: Math.random() * 0.6 + 0.8
                });
            }

            if (!confettiAnimId) animateConfetti();
        }

        function animateConfetti() {
            if (!confettiCtx) return;
            const w = confettiCanvas.width;
            const h = confettiCanvas.height;

            confettiCtx.clearRect(0, 0, w, h);

            confettiParticles = confettiParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25; // 重力
                p.rotation += p.rotV;
                p.vx *= 0.99;
                p.life -= 0.008;
                p.opacity = Math.max(0, p.life);

                if (p.life <= 0) return false;

                confettiCtx.save();
                confettiCtx.globalAlpha = p.opacity;
                confettiCtx.translate(p.x, p.y);
                confettiCtx.rotate(p.rotation * Math.PI / 180);
                confettiCtx.fillStyle = p.color;
                confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                confettiCtx.restore();
                return true;
            });

            if (confettiParticles.length > 0) {
                confettiAnimId = requestAnimationFrame(animateConfetti);
            } else {
                confettiAnimId = null;
            }
        }

        function updateOverlay(slider, taskIndex) {
            const overlay = document.getElementById(`task-${taskIndex}-overlay`);
            if (overlay) overlay.style.opacity = slider.value / 100;
        }
        // 暴露到全局作用域，使 HTML oninput 属性可调用
        window.updateOverlay = updateOverlay;

        function scrollToTask(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelector(`.nav-item[data-target="${id}"]`)?.classList.add('active');
            }
            // 移动端：选择任务后关闭侧边栏
            closeMobileSidebar();
        }

        // ===== 移动端侧边栏 =====
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('navSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                closeMobileSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            }
        }

        function closeMobileSidebar() {
            const sidebar = document.getElementById('navSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
        // 暴露到全局
        window.toggleMobileSidebar = toggleMobileSidebar;
        window.closeMobileSidebar = closeMobileSidebar;

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('uirel-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        function copyShareLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const tip = document.getElementById('copyTip');
                tip.style.opacity = '1';
                setTimeout(() => tip.style.opacity = '0', 1500);
            });
        }

        // 暴露到全局作用域（HTML onchange/onclick 属性需要）
        window.toggleBug = toggleBug;
        window.copyShareLink = copyShareLink;
        window.toggleTheme = toggleTheme;

        // 侧边栏拖拽
        if (document.getElementById('resizeHandle') && document.getElementById('navSidebar')) {
            document.getElementById('resizeHandle').addEventListener('mousedown', e => {
                e.preventDefault();
                const onMove = e => {
                    const w = Math.max(160, Math.min(400, e.clientX));
                    document.getElementById('navSidebar').style.width = w + 'px';
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        // 初始化
        (function() {
            try {
                if (localStorage.getItem('uirel-theme') === 'dark') document.body.classList.add('dark');
            } catch(e) {}
            init();
        })();
    </script>
</body>
</html>
